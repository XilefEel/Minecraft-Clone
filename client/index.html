<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>client</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>
    <body>
        <div id="title-screen">
            <h1>Minecraft</h1>
            <div id="menu">
                <input
                    id="username-input"
                    minlength="4"
                    maxlength="32"
                    type="text"
                    placeholder="Username"
                />
                <input
                    id="ip-input"
                    maxlength="32"
                    type="text"
                    placeholder="localhost:3000"
                />
                <button id="play-btn">Play</button>
            </div>
        </div>

        <canvas id="c"></canvas>
        <div id="hud">
            <div id="world-coords"></div>
            <div id="chunk-coords"></div>
            <div id="local-coords"></div>
            <div id="day"></div>
            <div id="time"></div>
        </div>
        <div id="crosshair"></div>
        <input
            id="chat"
            maxlength="255"
            type="text"
            placeholder="Type a message..."
        />
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
